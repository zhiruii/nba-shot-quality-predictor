name: Data refresh

on:
  schedule:
    - cron: "0 6 */2 * *"  # every 2 days at 06:00 UTC
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4


      - name: Run incremental data fetch
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python data.py
